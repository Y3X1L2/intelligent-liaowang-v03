<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>后台登录 - 智能瞭望与智能问数系统</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="login-page">
  <div class="ambient ambient-one"></div><div class="ambient ambient-two"></div>
  <main class="login-shell">
    <section class="login-intro">
      <div class="brand-mark">LW</div><p class="eyebrow">INTELLIGENT DATA PLATFORM</p>
      <h1>智能瞭望与智能问数系统</h1>
      <p class="intro-copy">融合采集、数据治理、模型引擎与数字员工的一体化数据智能平台。</p>
      <div class="feature-list"><span>数据采集</span><span>模型引擎</span><span>数字员工</span></div>
    </section>
    <section class="login-card glass-panel">
      <div class="login-card-head"><p class="eyebrow">ADMIN CONSOLE · V0.3</p><h2>后台登录</h2><p>管理员进入业务与权限管理控制台</p></div>
      <form id="loginForm" class="form-stack">
        <label class="field"><span>用户名</span><input id="username" name="username" value="admin" autocomplete="username" required maxlength="30"></label>
        <label class="field"><span>密码</span><input id="password" name="password" type="password" value="admin123" autocomplete="current-password" required maxlength="72"></label>
        <div id="loginError" class="form-error" role="alert"></div>
        <button id="loginButton" class="btn btn-primary btn-block" type="submit">登录后台</button>
      </form>
      <div class="demo-account"><strong>管理员账号</strong><span>admin / admin123</span></div>
      <p class="login-switch"><a href="/portal-login">返回智能问数前台</a></p>
    </section>
  </main>
  <script src="/admin-login.js"></script>
</body>
</html>
