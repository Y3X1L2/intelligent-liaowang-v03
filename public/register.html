<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>注册 - 智能瞭望与智能问数</title><link rel="stylesheet" href="/portal.css"></head>
<body class="auth-page">
  <div class="auth-visual"><div class="portal-logo">LW</div><p class="kicker">CREATE ACCOUNT</p><h1>开启你的智能数据工作流</h1><p>注册后即可使用智能问数、AI 问答、数字员工、报表与个人任务中心。</p><div class="auth-tags"><span>快速注册</span><span>模型切换</span><span>任务追踪</span></div></div>
  <main class="auth-card"><p class="kicker">NEW MEMBER</p><h2>创建前台账号</h2><p class="muted">请填写基本信息</p>
    <form id="authForm" data-mode="register">
      <label>用户名<input name="username" required minlength="3" maxlength="30" pattern="[A-Za-z0-9_]+" autocomplete="username"></label>
      <label>姓名<input name="realName" required maxlength="40"></label>
      <label>电子邮箱<input name="email" type="email" maxlength="100"></label>
      <label>密码<input name="password" type="password" required minlength="6" maxlength="72" autocomplete="new-password"></label>
      <div class="auth-error" id="authError"></div><button type="submit" id="authButton">注册并进入</button>
    </form>
    <p class="auth-link">已有账号？<a href="/portal-login">返回登录</a></p>
  </main>
  <script src="/auth.js"></script>
</body></html>
